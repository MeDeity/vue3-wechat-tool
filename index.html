<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="//cdn.jsdelivr.net/npm/vue@3.2.37"></script>
    <!--  添加 vue-demi 的 CDN 地址 -->
    <script src="//cdn.jsdelivr.net/npm/vue-demi@0.13.7"></script>
    <title>微信对话生成器</title>
    <style>
      .visual-loading-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 999999999;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        color: #333;
        font-size: 14px;
      }

      .visual-circle-path {
        stroke: #0f62fe;
        /* 给画笔设置一个颜色 */
        stroke-width: 2;
        /* 设置线条的宽度 */
        stroke-dasharray: 95, 126;
        /* 设置实现长95，虚线长126 */
        stroke-dashoffset: 0;
        /* 设置虚线的偏移位置 */
        animation: visual-loading-dash 1.5s ease-in-out infinite;
      }

      @keyframes visual-loading-dash {
        0% {
          stroke-dasharray: 1, 126;
          /* 实线部分1，虚线部分126 */
          stroke-dashoffset: 0;
          /* 前面1/126显示实线，后面125显示空白 */
        }

        50% {
          stroke-dasharray: 95, 126;
          /* 实线部分95，虚线部分126 */
          stroke-dashoffset: -31px
          /* 顺时针偏移31/126，即前31/126显示空白，后面3/4显示线条 */
        }

        to {
          stroke-dasharray: 6, 120;
          /* 实线部分6，虚线部分120 */
          stroke-dashoffset: -120px;
          /* 最后顺时针偏移120/126，即前120/126显示空白，后面6点显示线条部分 */
        }
      }

      .visual-loading-svg {
        width: 2.5em;
        height: 2.5em;
        max-width: 50px;
        /* 设置svg显示区域大小 */
        max-height: 50px;
        animation: visual-loading-rotate 1.5s infinite ease-in-out;
        /* 给svg也加上一个旋转动画 */
        margin-bottom: 20px;
      }

      @keyframes visual-loading-rotate {
        to {
          transform: rotate(1turn);
          /* 旋转1圈 */
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <script type="importmap">
        { "imports": {
            "vue":               "https://cdnjs.cloudflare.com/ajax/libs/vue/3.2.41/vue.esm-browser.prod.js",
            "vue-router":        "https://cdnjs.cloudflare.com/ajax/libs/vue-router/4.1.5/vue-router.esm-browser.min.js",
            "@vue/devtools-api": "https://unpkg.com/@vue/devtools-api@6.4.5/lib/esm/index.js"
        } }
      </script>
      
      <script type="module">
        import { createRouter, createWebHistory } from 'vue-router'
        import { createApp } from 'vue'
      
        const app = createApp({ template: 'Hello world.' })
        const router = createRouter({
          routes: [{ path: '/:pathMatch(.*)*', component: app }],
          history: createWebHistory()
        })
        app.use(router)
      
        document.addEventListener('DOMContentLoaded', () => app.mount('.app'));
      </script>
      
      <div class="visual-loading-container">
        <svg viewBox="0 0 50 50" class="visual-loading-svg">
          <circle cx="25" cy="25" r="20" fill="none" class="visual-circle-path"></circle>
        </svg>
        <p>正在努力加载页面，请耐心等候...</p>
      </div>
    </div>
    <script type="module" src="src/main.js"></script>
  </body>
</html>
